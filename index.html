  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=0.5, user-scalable=no">
    <title>stelliferous</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Yesteryear&display=auto">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
      body { margin:0; overflow:hidden; background:#000000; font-family:'Yesteryear',sans-serif; touch-action:none; }
      #hud-logo {
        position:fixed; bottom:0; left:0;
        z-index:100;
        padding:38px 42px 9px 32px;
        font-size:50px; 
        color:#DDDDDD; text-shadow:0 0 3px #888888, 0 0 8px #DDDDDD;
      }
      #hud-buttons {
        position:fixed; bottom:0; right:0;
        z-index:100;
        padding:38px 42px 18px 32px;
        text-align:right;
        font-size:30px;
        color:#DDDDDD; text-shadow:0 0 3px #888888, 0 0 8px #DDDDDD;
      }
      #hud-stelliferous { text-shadow:0 0 5px #FFFFFF, 0 0 3px #FFFFFF; }
      .hud-button { display:inline-block; width:30px; padding-left:4px; text-align:left; cursor:pointer; }
      .hud-button > a > i { color:#DDDDDD; }
      .hud-button:hover > a > i { color:#FFFFFF; }
      .hud-button:hover > i { color:#FFFFFF; }
      .hud-button-disabled { opacity:0.3; cursor:default !important; }
      .hud-button-hint-pulse {
        color:#d4ae46;
        animation:hud-button-hint-pulse-animation 1.5s ease-in-out infinite alternate;
      }
      #hud-button-volume { padding-left:12px; }
      @keyframes hud-button-hint-pulse-animation {
        from { text-shadow:0 0 5px #000000; color:#c9c8c7; }
        to { text-shadow:0 0 20px #c9c8c7, 0 0 30px #FFFFFF; color:#c9c8c7; }
      }
      canvas { display: block; }
      .noselect {
        -webkit-touch-callout:none; /* iOS Safari */
          -webkit-user-select:none; /* Safari */
           -khtml-user-select:none; /* Konqueror HTML */
             -moz-user-select:none; /* Old versions of Firefox */
              -ms-user-select:none; /* Internet Explorer/Edge */
                  user-select:none; /* Non-prefixed version, currently
                                       supported by Chrome, Edge, Opera and Firefox */
      }
    </style>
